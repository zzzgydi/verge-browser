services:
  api:
    build:
      context: ..
      dockerfile: docker/api-server.Dockerfile
    image: verge-browser-api:latest
    working_dir: ${PROJECT_ROOT:?set PROJECT_ROOT to the repo absolute path}
    environment:
      VERGE_SANDBOX_BASE_DIR: ${PROJECT_ROOT:?set PROJECT_ROOT to the repo absolute path}/.local/sandboxes
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ${PROJECT_ROOT:?set PROJECT_ROOT to the repo absolute path}:${PROJECT_ROOT:?set PROJECT_ROOT to the repo absolute path}
      - /var/run/docker.sock:/var/run/docker.sock

  runtime-xvfb:
    build:
      context: ..
      dockerfile: docker/runtime-xvfb.Dockerfile
    image: verge-browser-runtime-xvfb:latest
    command: ["/bin/true"]
    profiles: ["build"]

  runtime-xpra:
    build:
      context: ..
      dockerfile: docker/runtime-xpra.Dockerfile
    image: verge-browser-runtime-xpra:latest
    command: ["/bin/true"]
    profiles: ["build"]
